name: Android Build
on: [push, pull_request]

jobs:
  build:
    # 互換性の高い Ubuntu 22.04 を使用
    runs-on: ubuntu-22.04
    
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            libncurses5-dev libncursesw5-dev \
            zlib1g-dev \
            curl unzip \
            libffi-dev libssl-dev \
            ant autoconf automake libtool pkg-config

      - name: Build with Buildozer
        run: |
          # 1. 競合を避けるため既存のツールを一度削除して最新版を入れ直す
          pip uninstall -y buildozer python-for-android
          pip install --user buildozer Cython==0.29.33 python-for-android
          
          # 2. パスの設定
          export PATH=$PATH:~/.local/bin
          
          # 3. ライセンス同意のための設定ファイル作成
          mkdir -p ~/.android
          touch ~/.android/repositories.cfg
          
          # 4. ファイル名の修正（もし .txt が付いていたら直す）
          if [ -f buildozer.spec.txt ]; then mv buildozer.spec.txt buildozer.spec; fi
          
          # 5. Java 17 を明示的に指定
          export JAVA_HOME=$JAVA_HOME_17_X64
          
          # 6. ビルド実行（詳細ログ表示）
          buildozer -v android debug
        env:
          # ライセンス自動承諾の環境変数
          ACCEPT_SDK_LICENSE: "yes"
          ANDROID_SDK_HOME: /home/runner/.android
        
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: package
          # ビルド成功時に生成されるAPKの場所
          path: bin/*.apk
